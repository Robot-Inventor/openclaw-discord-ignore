name: Lint

on:
    push:
        branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
    lint:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v5
            - uses: oven-sh/setup-bun@v2

            - run: bun install --frozen-lockfile
            - run: bun run lint
